<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नमस्ते वीडियो ट्यूब - पार्टनर प्रोग्राम</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>नमस्ते वीडियो ट्यूब</h1>
        <p>रॉबर्ट्सगंज से छोटे क्रिएटर्स के लिए</p>
    </header>

    <main>
        <section id="registration-form">
            <h2>पार्टनर प्रोग्राम रजिस्ट्रेशन</h2>
            <form id="partnerForm">
                <input type="text" id="name" placeholder="आपका पूरा नाम" required>
                <input type="email" id="email" placeholder="ईमेल पता" required>
                <input type="text" id="channelName" placeholder="यूट्यूब चैनल का नाम" required>
                <input type="url" id="videoLink" placeholder="वीडियो लिंक (URL)" required>
                <button type="submit">सबमिट करें</button>
            </form>
            <p id="message"></p>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
